<svg viewBox="0 0 768 768" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark burgundy background -->
  <rect width="768" height="768" fill="#3D1428"/>
  
  <!-- Perfume bottle icon -->
  <g transform="translate(384, 200)">
    <!-- Bottle cap -->
    <rect x="-25" y="-35" width="50" height="20" fill="white" rx="2"/>
    <circle cx="0" cy="-35" r="15" fill="none" stroke="white" stroke-width="3"/>
    
    <!-- Spray nozzle -->
    <path d="M -15 -55 Q -20 -70 -15 -80 M 0 -55 Q 0 -75 0 -85 M 15 -55 Q 20 -70 15 -80" 
          stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Bottle body -->
    <path d="M -45 -15 Q -50 20 -45 60 Q -40 90 0 100 Q 40 90 45 60 Q 50 20 45 -15 Z" 
          fill="none" stroke="white" stroke-width="3"/>
    
    <!-- Bottle lines/texture -->
    <line x1="-35" y1="0" x2="35" y2="0" stroke="white" stroke-width="2"/>
    <line x1="-38" y1="20" x2="38" y2="20" stroke="white" stroke-width="2"/>
    <line x1="-40" y1="40" x2="40" y2="40" stroke="white" stroke-width="2"/>
    <line x1="-35" y1="60" x2="35" y2="60" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Text: "10ML" -->
  <text x="384" y="480" font-size="140" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">10ML</text>
  
  <!-- Text: "perfume" -->
  <text x="384" y="580" font-size="60" fill="white" text-anchor="middle" font-family="cursive" font-style="italic">perfume</text>
  
  <!-- Text: "BY AHNAF" -->
  <text x="550" y="520" font-size="32" fill="white" text-anchor="start" font-family="Arial, sans-serif" font-weight="600">BY AHNAF</text>
</svg>